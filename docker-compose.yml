services:
  3xui:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: 3xui_app
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
    tty: true
    restart: unless-stopped

    # ==================== 关键修改部分 ====================
    # 删除 network_mode: host
    # 改为 ports 映射（桥接模式）
    ports:
      - "14253:2053"     # 面板端口（推荐改成高位随机端口，防止被扫描）
      - "22504:22504"    # 你的 Reality 节点端口
      - "20153:20153"    # 你的 HTTPX / WS 节点端口（如果以后要直连就保留）
